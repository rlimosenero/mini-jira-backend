spring.application.name=mini-jira-backend

# --- H2 file-based database ---
# Data persists in ./data/minijira.mv.db next to wherever you run the jar from.
spring.datasource.url=jdbc:h2:file:./data/minijira;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 web console at http://localhost:8080/h2-console
# JDBC URL to use when connecting: jdbc:h2:file:./data/minijira
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=3000
